name: Release Build

on:
  push:
    branches:
      - release
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            binary_suffix: 'x86_64-pc-windows-msvc.exe'
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            binary_suffix: 'aarch64-apple-darwin'
          - platform: 'macos-13'
            target: 'x86_64-apple-darwin'
            binary_suffix: 'x86_64-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ===== PYTHON BACKEND BUILD =====
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        working-directory: ./backend
        run: pip install -r requirements.txt pyinstaller

      - name: Build backend with PyInstaller
        working-directory: ./backend
        run: python -m PyInstaller ga-erp-backend.spec --noconfirm

      - name: Copy binary to binaries folder (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $dst = "frontend/src-tauri/binaries/ga-erp-backend-${{ matrix.binary_suffix }}"
          if (Test-Path "backend/dist/ga-erp-backend.exe") {
            Copy-Item "backend/dist/ga-erp-backend.exe" $dst -Force
          }

      - name: Copy binary to binaries folder (macOS)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          DST="frontend/src-tauri/binaries/ga-erp-backend-${{ matrix.binary_suffix }}"
          if [ -f "backend/dist/ga-erp-backend" ]; then
            cp "backend/dist/ga-erp-backend" "$DST"
            chmod +x "$DST"
          elif [ -f "backend/dist/ga-erp-backend.app/Contents/MacOS/ga-erp-backend" ]; then
            cp "backend/dist/ga-erp-backend.app/Contents/MacOS/ga-erp-backend" "$DST"
            chmod +x "$DST"
          else
            echo "ERROR: No se encontró el binario de PyInstaller"
            ls -la backend/dist/
            exit 1
          fi

      # ===== TAURI FRONTEND BUILD =====
      - name: Setup Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Vite frontend
        working-directory: ./frontend
        run: npm run build

      - name: Build Tauri app
        working-directory: ./frontend
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: List bundle output
        shell: bash
        run: |
          echo "=== Buscando bundles ==="
          find frontend/src-tauri/target -name "*.dmg" -o -name "*.msi" -o -name "*.exe" 2>/dev/null | head -20
          echo "=== Estructura target ==="
          ls -la frontend/src-tauri/target/ || echo "No existe target/"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: el-menestral-erp-${{ matrix.target }}
          path: |
            frontend/src-tauri/target/release/bundle/**/*.msi
            frontend/src-tauri/target/release/bundle/**/*.dmg
            frontend/src-tauri/target/release/bundle/**/*.app.tar.gz
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Draft Release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}