name: Release Build

on:
  push:
    branches:
      - release
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            binary_suffix: 'x86_64-pc-windows-msvc.exe'
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            binary_suffix: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
            binary_suffix: 'x86_64-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ===== PYTHON BACKEND BUILD =====
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        working-directory: ./backend
        run: pip install -r requirements.txt pyinstaller

      - name: Build backend with PyInstaller
        working-directory: ./backend
        run: python -m PyInstaller ga-erp-backend.spec --noconfirm

      - name: Rename and copy binary to binaries folder
        shell: pwsh
        run: |
          $target = "${{ matrix.binary_suffix }}"
          $src = "backend/dist/ga-erp-backend.exe"
          $dst = "frontend/src-tauri/binaries/$target"
          
          # Verificar si existe el output de PyInstaller
          if (Test-Path "backend/dist/ga-erp-backend.exe") {
            Copy-Item $src $dst -Force
            Write-Host "Copied: $src -> $dst"
          } elseif (Test-Path "backend/dist/ga-erp-backend") {
            # En Mac puede ser sin extensión
            Copy-Item "backend/dist/ga-erp-backend" $dst -Force
            Write-Host "Copied (Mac binary): backend/dist/ga-erp-backend -> $dst"
          } else {
            # Verificar si es un .app (Mac GUI app)
            $appPath = "backend/dist/ga-erp-backend.app"
            if (Test-Path $appPath) {
              $macBinary = "$appPath/Contents/MacOS/ga-erp-backend"
              if (Test-Path $macBinary) {
                Copy-Item $macBinary $dst -Force
                Write-Host "Copied from .app: $macBinary -> $dst"
              }
            } else {
              Write-Host "WARNING: No binary found at $src"
              dir backend/dist/
            }
          }

      # ===== TAURI FRONTEND BUILD =====
      - name: Setup Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Vite frontend
        working-directory: ./frontend
        run: npm run build

      - name: Build Tauri app
        working-directory: ./frontend
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: el-menestral-erp-${{ matrix.target }}
          path: |
            frontend/src-tauri/target/release/bundle/**/*.msi
            frontend/src-tauri/target/release/bundle/**/*.dmg
            frontend/src-tauri/target/release/bundle/**/*.app.tar.gz
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Draft Release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}