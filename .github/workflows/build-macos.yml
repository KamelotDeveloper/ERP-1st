# Build macOS (CI)
# ================
# Valida que el build funcione correctamente en macOS tanto para Apple Silicon (ARM)
# como para Intel (x86_64) en cada PR y push a main.
#
# DIFERENCIA con release.yml:
#   - Este workflow SOLO compila, NO genera releases
#   - Corre en PRs para detección temprana de errores
#   - No necesita secrets de signing (build sin firmar)
#
# El release con firma y notarization se maneja en release.yml

name: Build macOS (CI)

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: macos-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            binary_suffix: 'aarch64-apple-darwin'
          - platform: 'macos-15-intel'
            target: 'x86_64-apple-darwin'
            binary_suffix: 'x86_64-apple-darwin'

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ===== PYTHON BACKEND BUILD (PyInstaller) =====
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        working-directory: ./backend
        run: pip install -r requirements.txt pyinstaller

      - name: Build backend with PyInstaller
        working-directory: ./backend
        run: python -m PyInstaller ga-erp-backend.spec --noconfirm

      - name: Debug PyInstaller output
        shell: bash
        run: |
          echo "=== backend/dist/ contents ==="
          ls -la backend/dist/
          echo "=== Searching for binary ==="
          find backend/dist -type f -name "ga-erp-backend*" 2>/dev/null

      - name: Copy binary to Tauri binaries folder
        shell: bash
        run: |
          mkdir -p frontend/src-tauri/binaries
          DST="frontend/src-tauri/binaries/ga-erp-backend-${{ matrix.binary_suffix }}"
          echo "Target DST: $DST"

          if [ -f "backend/dist/ga-erp-backend" ]; then
            echo "✓ Found single binary at backend/dist/ga-erp-backend"
            cp "backend/dist/ga-erp-backend" "$DST"
          elif [ -f "backend/dist/ga-erp-backend.app/Contents/MacOS/ga-erp-backend" ]; then
            echo "✓ Found binary inside .app bundle"
            cp "backend/dist/ga-erp-backend.app/Contents/MacOS/ga-erp-backend" "$DST"
          else
            echo "ERROR: No se encontró el binario de PyInstaller"
            find backend/dist -type f -ls 2>/dev/null
            exit 1
          fi

          chmod +x "$DST"
          file "$DST"
          ls -la "$DST"

      # ===== TAURI FRONTEND + RUST BUILD =====
      - name: Setup Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ matrix.target }}-${{ hashFiles('frontend/src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.target }}

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Vite frontend
        working-directory: ./frontend
        run: npm run build

      - name: Build Tauri app
        working-directory: ./frontend
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: List bundle output
        shell: bash
        run: |
          echo "=== Bundles generados ==="
          find frontend/src-tauri/target/${{ matrix.target }}/release/bundle -type f -ls 2>/dev/null || echo "No se encontraron bundles"
          echo "=== .dmg files ==="
          find frontend/src-tauri/target -name "*.dmg" 2>/dev/null
          echo "=== .app bundles ==="
          find frontend/src-tauri/target -name "*.app" -maxdepth 5 2>/dev/null

      - name: Upload DMG artifact (debug)
        uses: actions/upload-artifact@v4
        with:
          name: el-menestral-erp-${{ matrix.target }}-ci
          path: frontend/src-tauri/target/${{ matrix.target }}/release/bundle/
          if-no-files-found: warn
